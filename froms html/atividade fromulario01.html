<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="icon" href="bob.png" type="image/png">
</head>
<body>

    <form>
    <h1>FORMULARIO CURRICULUN</h1><br>
    <fieldset>
        <legend>DADOS PESSOAIS</legend>
    
    <label for="fone">Digite seu nome</label>
    <input type="nome" name="nome" id="nome"placeholder="digite seu nome"><br><br>
    <label for="fone">Digite seu telefone</label>
    <input type="tel" name="fone" id="fone" pattern="[0-9]{2}-[0-9]{9}" placeholder="00-000000000" required><br><br>
    <label for="fone">Digite seu indereço</label>
    <input type="address" name="Endereço" id="fone"placeholder="digite endereço"><br>

     <label for="estados">Selecione um Estado</label>
    <select name="estados" id="estados">
        <option value="BA">BA</option>
        <option value="MG" selected>MG</option>
        <option value="SC">SC</option>
        <option value="MA">MA</option>
    </select><br><br>

     <label for="cidade">Selecione uma cidade</label>
    <select name="cidade" id="cidade">
        <option value="salvador">salvador</option>
        <option value="bh" selected>belo horizonte</option>
        <option value="flor">florianopolis</option>
        <option value="sl">sao luiz</option>
    </select><br><br>

<h4>AREA DE INTERESSE</h4>
    <input type="checkbox" id="cor1" name="cor1" value="Branco">
    <label for="cor1">computaçao</label><br>
    <input type="checkbox" id="cor2" name="cor2" value="Azul">
    <label for="cor2"> biologia</label><br>
    <input type="checkbox" id="cor3" name="cor3" value="Amarelo">
    <label for="cor3">meio ambiente</label><br>
    <input type="checkbox" id="cor3" name="cor3" value="Amarelo">
    <label for="cor3">engenharia</label><br>
    <input type="checkbox" id="cor3" name="cor3" value="Amarelo">
    <label for="cor3">historia</label><br>

    <h4>DADOS PROFISSIONAIS</h4>

    <input type="radio" name="select" id="gerencia" value="gerencia">
    <label for="select">gerencia</label><br>
    <input type="radio" name="select" id="financeiro" value="financeiro">
    <label for="select">financeiro</label><br>
    <input type="radio" name="select" id="administrativo" value="administrativo">
    <label for="select">administrativo</label><br>
     <input type="radio" name="select" id="juridico" value="juridico">
    <label for="select">juridico</label><br>

    <label for="mensagem">mine-curriculun</label>
    <textarea name="mensagem" id="mensagem" rows="5" cols="30">Digite sua mensagem</textarea> <br><br>

    <label for="reset">Apagar campos</label>
    <input type="reset" name="reset" id="reset" value="limpar"><br><br>

    <label for="enviar">Enviar informações</label>
    <input type="submit" name="enviar" id="enviar" value="Enviar"><br><br>



    </form>
    

</body>
</html>
