<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTATO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>body{
           margin: 0;
           height: 100vh;
           display: flex;
           justify-content: center;
           align-items: center;
           background: rebeccapurple;
           font-family: Arial, Helvetica, sans-serif;
           color: #ecbfbf;
}
.card{
    background: rgb(137, 144, 126);
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
}
.imgperfil{
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 5px solid blue;
    margin-bottom: 12px;
    object-fit: cover;
}

h2{margin: 10px 0 5px;
    font-size: 30px;


}
.local{
    font-weight: bold;
    font-size: 12px;
    margin-bottom: 10px;
}
.job{ 
    font-size: 16px;
    line-height: 1.5;
}
.botoes{
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
}
.btn{
    padding: 10px 15px;
    border-radius: 6px;
    border: 1px solid blue;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}
.btn:hover{
    opacity: 0.8;
    background: rgb(130, 130, 238);
}
.skills{
    margin-top: 20px;
    text-align: left;
}
.skills h3{
    font-size: 20px;
    margin-bottom: 10px;
}
.tags{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}
.tag{
    border: 1px solid aliceblue;
    padding: 5px 10px;
    border-radius: 4px;
}
.social-midia{
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 20px;
}

.social-midia i{
    cursor: pointer;
    transition: 0.3s;
}
.social-midia i :hover{
    color: violet;
    transform: scale(1.2);
}







</style>


</head>
<body>
    <div class="card">
        <img src="caricatura.png" alt="foto de perfil" class="imgperfil">
        <h2>Douglas A Fernandes</h2>
        <div class="local">MONTES CLAROS - MG</div>
        <div class="job">ESTUDANTE EM T.I<br>TECNICO EM INFORMATICA</div>

    <div class="botoes">
    <button class="btn primario">menssagem</button>
    <button class="btn secundario">follow</button>
    </div>
    <div class="skills">
        <h3>habilidades</h3>
        <div class="tags">
            <span class="tag"> redes</span>
            <span class="tag"> hardware</span>
            <span class="tag"> packtrace</span>
            <span class="tag"> banco de dados</span>
            <span class="tag"> python</span>
            <span class="tag"> formataçao</span>
            <span class="tag"> linux</span>
            <span class="tag"> html</span>

 </div>
   <div class="social-midia">
  <i class="fab fa-facebook"></i>
  <i class="fab fa-github"></i>
  <i class="fab fa-linkedin"></i>
  <i class="fab fa-instagram"></i>
</div>
    </div>
</body>
</html>
